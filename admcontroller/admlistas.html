<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Listagens do Sistema</title>
    <link rel="stylesheet" href="/styles/listas.css">
</head>
<body>

    <h1>Visualização de Dados</h1>

    <div class="painel-controle">
        <label>Escolha a lista:</label>
        <select id="tipoLista">
            <option value="clientes">Clientes</option>
            <option value="produtos">Produtos</option>
            <option value="pedidos">Pedidos</option>
        </select>
        <select id="ordenacaoClientes" class="hidden">
            <option value="id">Clientes por ID</option>
            <option value="nome">Clientes A-Z</option>
            <option value="status">Clientes por Status</option>
        </select>
        <select id="ordenacaoProdutos" class="hidden">
            <option value="id">Produtos por ID</option>
            <option value="nome">Produtos A-Z</option>
            <option value="preco">Produtos por Preço</option>
            <option value="estoque">Produtos por Estoque</option>
            <option value="categoria">Produtos por Categoria</option>
        </select>
        <select id="ordenacaoPedidos" class="hidden">
            <option value="id">Pedidos por ID</option>
            <option value="valor">Pedidos por valor</option>
            <option value="quantidade">Pedidos por Quantidade</option>
            <option value="status">Pedidos por Status</option>
        </select>

        <button id="btnCarregar">Carregar</button>
    </div>

    <div class="tabela-container">
        <table id="tabelaDados">
            <thead id="cabecalho"></thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <script type="module" src="./admlistas.js"></script>
</body>
</html>

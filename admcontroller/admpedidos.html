<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>
    <link rel="stylesheet" href="../styles/secoesadm.css" />
</head>

<body class="container">
    <h2>Gerar Pedido</h2>

    <label>ID do Cliente:</label><br>
    <input id="idCliente" type="number"><br><br>

    <label>ID do Produto:</label><br>
    <input id="idProduto" type="number"><br><br>

    <label>Quantidade:</label><br>
    <input id="quantidade" type="number"><br><br>

    <button id="btnGerar">Gerar Pedido</button>

    <h2 id="hidden1" class="hidden">Resultado</h2>
    <pre id="resultadoGerar"></pre>

    <h2>Buscar Pedido</h2>

    <label>ID do Pedido:</label><br>
    <input id="idPedidoBuscar" type="number"><br><br>

    <button id="btnBuscar">Buscar Pedido</button>

    <h2 id="hidden2" class="hidden">Resultado da Busca</h2>
    <pre id="resultadoBusca"></pre>

    <script type="module" src="./admpedidos.js"></script>
</body>
</html>
